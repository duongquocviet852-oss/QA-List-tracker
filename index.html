async function dbGet(table,params=""){const r=await fetch(`${SUPA_URL}/rest/v1/${table}?order=created_at.desc${params}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json()}
async function dbInsert(table,body){const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:"POST",headers:H,body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function dbUpdate(table,id,body){const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers:H,body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function dbDelete(table,id){const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:H});if(!r.ok)throw new Error(await r.text())}

const STEP_TEMPLATE_EXISTING=STEP_TEMPLATE_NEW.filter(s=>["4","5","6","7","8","9"].includes(s.group));
function makeSteps(factoryType){
  const tpl=factoryType==="New"?STEP_TEMPLATE_NEW:STEP_TEMPLATE_EXISTING;
  return tpl.map(s=>({id:uid(),group:s.group,no:s.no,title:s.title,status:"New",dueDate:"",note:"",remark:"",evidenceUrl:"",updatedAt:"",skipped:false}));
}
function mapDevProject(p){return{id:p.id,supplierId:p.supplier_id,title:p.title,factoryType:p.factory_type||"New",status:p.status||"In Progress",steps:p.steps||[],createdAt:p.created_at}}

const STATUSES=["New","In Progress","Pending","Done"];
const PRIORITIES=["High","Medium","Low"];
const TYPES=["Long-term","Short-term"];
const CATEGORIES=["4M Machine","4M Method","4M Material","4M Man","Inspection","No doc","QC","Other"];
const PROCESSES=["Incoming Material Inspection","Manufacturing","Filling","Sealing","Capping","Labeling","QC","In-process Inspection","Packing","Assembly","Final Inspection","Warehousing","Shipping","Other"];

const STATUS_COLOR={"New":"#f1f5f9;color:#475569","In Progress":"#dbeafe;color:#1d4ed8","Pending":"#fef3c7;color:#b45309","Done":"#dcfce7;color:#15803d"};
const PRIORITY_DOT={"High":"#f87171","Medium":"#fbbf24","Low":"#d1d5db"};

function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function formatDate(d){if(!d)return"—";return new Date(d).toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric"})}
function daysLeft(due){if(!due)return null;return Math.ceil((new Date(due)-new Date())/86400000)}

function mapSupplier(f){return{id:f.id,name:f.name,location:f.location||"",note:f.note||"",createdAt:f.created_at}}
function mapTask(t){return{
  id:t.id,supplierId:t.factory_id,partner:t.partner||"",title:t.title||"",
  type:t.type||"Short-term",status:t.status||"New",priority:t.priority||"Medium",
  owner:t.owner||"",factoryOwner:t.factory_owner||"",
  manufactory:t.manufactory||"",category:t.category||"",issueNo:t.issue_no||"",
  itemJp:t.item_jp||"",itemEn:t.item_en||"",occurProcess:t.occur_process||"",
  productName:t.product_name||"",cause:t.cause||"",requestFromCainz:t.request_from_cainz||"",
  startDate:t.start_date||"",dueDate:t.due_date||"",progress:t.progress||0,
  subtasks:t.subtasks||[],comments:t.comments||[],createdAt:t.created_at
}}

function exportCSV(tasks,suppliers){
  const headers=["Supplier","Manufactory","No","Category","Item EN","Process","Product","Status","Priority","Owner","Deadline","Progress%","Cause"];
  const rows=tasks.map(t=>{
    const sup=suppliers.find(s=>s.id===t.supplierId)?.name||"";
    return[sup,t.manufactory,t.issueNo,t.category,t.itemEn,t.occurProcess,t.productName,t.status,t.priority,t.owner,t.dueDate,t.progress,t.cause].join(",");
  });
  const csv=[headers.join(","),...rows].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`issues_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

const {useState,useEffect}=React;

function Modal({title,onClose,children,footer,wide}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16,overflowY:"auto"}}>
      <div style={{background:"white",borderRadius:16,width:"100%",maxWidth:wide?720:580,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid #f1f5f9",position:"sticky",top:0,background:"white",zIndex:1}}>
          <span style={{fontWeight:600,color:"#1e293b",fontSize:14}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:"#94a3b8",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:20}}>{children}</div>
        {footer&&<div style={{padding:"12px 20px",borderTop:"1px solid #f1f5f9",display:"flex",justifyContent:"flex-end",gap:8,position:"sticky",bottom:0,background:"white"}}>{footer}</div>}
      </div>
    </div>
  );
}

function Inp({label,value,onChange,placeholder,type="text",required,rows}){
  const base={width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none"};
  return(
    <div style={{marginBottom:10}}>
      <label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:3}}>{label}{required&&<span style={{color:"#ef4444"}}> *</span>}</label>
      {rows
        ?<textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{...base,resize:"vertical"}}/>
        :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={base}/>
      }
    </div>
  );
}

function Sel({label,value,onChange,options,required}){
  return(
    <div style={{marginBottom:10}}>
      <label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:3}}>{label}{required&&<span style={{color:"#ef4444"}}> *</span>}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,background:"white",outline:"none"}}>
        {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}

function Btn({children,onClick,variant="primary",disabled,small,fullWidth}){
  const s={
    primary:{background:"#4f46e5",color:"white",border:"none"},
    secondary:{background:"white",color:"#64748b",border:"1px solid #e2e8f0"},
    danger:{background:"white",color:"#ef4444",border:"1px solid #fecaca"},
    success:{background:"#16a34a",color:"white",border:"none"},
  };
  return(
    <button onClick={onClick} disabled={disabled}
      style={{...s[variant],padding:small?"5px 10px":"8px 16px",borderRadius:8,fontSize:small?11:13,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,fontWeight:500,width:fullWidth?"100%":"auto"}}>
      {children}
    </button>
  );
}

function SupplierModal({supplier,onSave,onClose}){
  const[name,setName]=useState(supplier?.name||"");
  const[location,setLocation]=useState(supplier?.location||"");
  const[note,setNote]=useState(supplier?.note||"");
  const[saving,setSaving]=useState(false);
  async function save(){setSaving(true);await onSave({id:supplier?.id||uid(),name:name.trim(),location,note});setSaving(false)}
  return(
    <Modal title={supplier?"Edit supplier":"New supplier"} onClose={onClose}
      footer={<><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={save} disabled={!name.trim()||saving}>{saving?"Saving...":"Save"}</Btn></>}>
      <Inp label="Supplier name" value={name} onChange={setName} placeholder="Tên supplier..." required/>
      <Inp label="Location" value={location} onChange={setLocation} placeholder="Địa điểm..."/>
      <Inp label="Note" value={note} onChange={setNote} placeholder="Ghi chú..."/>
    </Modal>
  );
}

  const blank={id:uid(),supplierId:defaultSupplierId||suppliers[0]?.id||"",partner:"",title:"",type:"Short-term",status:"New",priority:"Medium",owner:"",factoryOwner:"",manufactory:"",category:"",issueNo:"",itemJp:"",itemEn:"",occurProcess:"",productName:"",cause:"",requestFromCainz:"",startDate:"",dueDate:"",progress:0,subtasks:[],comments:[]};

        <Sel label="Supplier *" value={form.supplierId} onChange={v=>set("supplierId",v)}

        </div>

      {tab==="detail"&&<>
        <div style={g2}>
          <Sel label="Category" value={form.category} onChange={v=>set("category",v)} options={["—",...CATEGORIES]}/>
          <Sel label="Occur process" value={form.occurProcess} onChange={v=>set("occurProcess",v)} options={["—",...PROCESSES]}/>

        <Inp label="Item (JP)" value={form.itemJp} onChange={v=>set("itemJp",v)} placeholder="日本語の説明..."/>

      </>}

          <Inp label="Factory owner (người phụ trách NM)" value={form.factoryOwner} onChange={v=>set("factoryOwner",v)} placeholder="Tên người phụ trách NM..."/>

          <Inp label="Start date" type="date" value={form.startDate} onChange={v=>set("startDate",v)}/>

function QuickUpdateModal({task,onSave,onClose}){
  const[progress,setProgress]=useState(task.progress);
  const[dueDate,setDueDate]=useState(task.dueDate||"");
  const[status,setStatus]=useState(task.status);
  const[note,setNote]=useState("");
  const[evidenceUrl,setEvidenceUrl]=useState("");
  const[saving,setSaving]=useState(false);
  const isImg=url=>url&&(url.includes("drive.google.com")||/\.(jpg|jpeg|png|gif|webp)/i.test(url));

  async function save(){
    if(!note.trim())return;
    setSaving(true);
    const newComment={id:uid(),text:note.trim(),progress,dueDate,status,evidenceUrl,ts:new Date().toISOString()};
    const updated={...task,progress,dueDate,status,comments:[...task.comments,newComment]};
    await onSave(updated);
    setSaving(false);
  }
  const g3={display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10};
  return(
    <Modal title={"+ Update: "+task.title} onClose={onClose} wide
      footer={<><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={save} disabled={!note.trim()||saving}>{saving?"Saving...":"Save update"}</Btn></>}>
      <div style={g3}>
        <Inp label="Progress %" type="number" value={progress} onChange={v=>setProgress(Number(v))}/>
        <Inp label="New due date" type="date" value={dueDate} onChange={setDueDate}/>
        <Sel label="Status" value={status} onChange={setStatus} options={STATUSES}/>
      </div>
      <Inp label="Update note *" value={note} onChange={setNote} placeholder="Mô tả tiến độ, action, kết quả..." rows={3}/>
      <Inp label="Evidence (Google Drive link hoặc URL ảnh)" value={evidenceUrl} onChange={setEvidenceUrl} placeholder="https://drive.google.com/..."/>
      {evidenceUrl&&(
        <div style={{marginTop:8,marginBottom:12}}>
          {isImg(evidenceUrl)
            ?<img src={evidenceUrl} className="img-preview" alt="evidence" onError={e=>{e.target.style.display="none"}}/>
            :<a href={evidenceUrl} target="_blank" rel="noreferrer"
                style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:"#4f46e5",padding:"6px 12px",border:"1px solid #c7d2fe",borderRadius:8,background:"#eef2ff"}}>
                🔗 View evidence
              </a>
          }
        </div>
      )}
      {task.comments.length>0&&<>
        <div style={{fontSize:11,color:"#94a3b8",margin:"12px 0 6px",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Previous updates</div>
        <div style={{maxHeight:180,overflowY:"auto"}}>
          {[...task.comments].reverse().map(c=>(
            <div key={c.id} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",marginBottom:6,borderLeft:"3px solid #818cf8"}}>
              <div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>{new Date(c.ts).toLocaleString("vi-VN")} · {c.progress}% · {c.status}</div>
              <div style={{fontSize:12,color:"#334155",lineHeight:1.5}}>{c.text}</div>
              {c.evidenceUrl&&(
                <a href={c.evidenceUrl} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#4f46e5",marginTop:4,display:"inline-block"}}>🔗 Evidence</a>
              )}
            </div>
          ))}
        </div>
      </>}
    </Modal>
  );
}

function TaskDetailModal({task,suppliers,onClose,onEdit,onQuickUpdate,onEditComment,onDeleteComment}){
  const sup=suppliers.find(s=>s.id===task.supplierId);
  const dl=daysLeft(task.dueDate);
  const isOverdue=task.status!=="Done"&&dl!==null&&dl<0;
  const[editingCommentId,setEditingCommentId]=useState(null);
  const[editText,setEditText]=useState("");
  const[editEvidence,setEditEvidence]=useState("");
  function startEdit(c){setEditingCommentId(c.id);setEditText(c.text);setEditEvidence(c.evidenceUrl||"")}
  function cancelEdit(){setEditingCommentId(null);setEditText("");setEditEvidence("")}
  function saveEdit(c){onEditComment(task,c.id,{...c,text:editText,evidenceUrl:editEvidence});cancelEdit()}
  return(
    <Modal title={`#${task.issueNo||"—"} · ${task.title}`} onClose={onClose} wide
      footer={
        <div style={{display:"flex",gap:8,width:"100%"}}>
          <Btn variant="secondary" onClick={onClose}>Close</Btn>
          <div style={{flex:1}}/>
          <Btn variant="secondary" onClick={()=>{onClose();onEdit(task)}}>Edit</Btn>
          <Btn onClick={()=>{onClose();onQuickUpdate(task)}}>+ Add update</Btn>
        </div>
      }>
      {/* Header info */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          ["Supplier",sup?.name||"—"],
          ["Manufactory",task.manufactory||"—"],
          ["Category",task.category||"—"],
          ["Occur process",task.occurProcess||"—"],
          ["Product",task.productName||"—"],
          ["Priority",task.priority],
        ].map(([l,v])=>(
          <div key={l} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div>
            <div style={{fontSize:12,color:"#1e293b",fontWeight:500}}>{v}</div>
          </div>
        ))}
      </div>

      {/* People & dates */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          ["Owner",task.owner||"—"],
          ["Factory owner",task.factoryOwner||"—"],
          ["Due date",task.dueDate?`${formatDate(task.dueDate)}${dl!==null?` (${isOverdue?Math.abs(dl)+"d overdue":dl+"d left"})`:""}` :"—"],
          ["Progress",task.progress+"%"],
        ].map(([l,v])=>(
          <div key={l} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div>
            <div style={{fontSize:12,color:l==="Due date"&&isOverdue?"#ef4444":"#1e293b",fontWeight:500}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Progress bar */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:6}}>
          <div style={{background:"#818cf8",height:6,borderRadius:4,width:`${task.progress}%`,transition:"width .3s"}}/>
        </div>
        <span style={{fontSize:11,color:"#94a3b8"}}>{task.progress}%</span>
      </div>

      {/* Item JP/EN */}
      {(task.itemEn||task.itemJp)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {task.itemEn&&<div style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>Item (EN)</div><div style={{fontSize:12,color:"#1e293b"}}>{task.itemEn}</div></div>}

                  <div style={{flex:1}}/>

                    <button onClick={()=>startEdit(c)} style={{fontSize:10,color:"#94a3b8",background:"white",border:"1px solid #e2e8f0",borderRadius:6,padding:"1px 6px",cursor:"pointer"}}>Edit</button>
                    <button onClick={()=>{if(confirm("Delete this update?"))onDeleteComment(task,c.id)}} style={{fontSize:10,color:"#ef4444",background:"white",border:"1px solid #fecaca",borderRadius:6,padding:"1px 6px",cursor:"pointer"}}>Del</button>
                  </>}
                </div>
                {editingCommentId===c.id?(
                  <div>
                    <textarea rows={3} value={editText} onChange={e=>setEditText(e.target.value)}
                      style={{width:"100%",border:"1px solid #c7d2fe",borderRadius:8,padding:"6px 10px",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box",marginBottom:6}}/>
                    <input value={editEvidence} onChange={e=>setEditEvidence(e.target.value)} placeholder="Evidence URL..."
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 10px",fontSize:12,outline:"none",boxSizing:"border-box",marginBottom:6}}/>
                    <div style={{display:"flex",gap:6}}>
                      <Btn small onClick={()=>saveEdit(c)}>Save</Btn>
                      <Btn small variant="secondary" onClick={cancelEdit}>Cancel</Btn>
                    </div>
                  </div>
                ):(<>
                  <div style={{fontSize:13,color:"#334155",lineHeight:1.6,marginBottom:c.evidenceUrl?8:0}}>{c.text}</div>

                    <div style={{marginTop:6}}>
                      {/\.(jpg|jpeg|png|gif|webp)/i.test(c.evidenceUrl)
                        ?<img src={c.evidenceUrl} className="img-preview" alt="evidence" style={{maxHeight:120}} onError={e=>{e.target.style.display="none"}}/>

                          </a>
                      }
                    </div>
                  )}
                </>)}
              </div>
            </div>
          ))}
        </div>
      }
    </Modal>
  );
}

function IssueRow({task,suppliers,onView,onEdit,onDelete,onStatusChange,onQuickUpdate,selected,onSelect}){
  const dl=daysLeft(task.dueDate);
  const isOverdue=task.status!=="Done"&&dl!==null&&dl<0;
  const isDueSoon=task.status!=="Done"&&dl!==null&&dl>=0&&dl<=7;
  const sup=suppliers.find(s=>s.id===task.supplierId);
  const bg=isOverdue?"#fff5f5":isDueSoon?"#fffbeb":"white";
  const border=isOverdue?"#fecaca":isDueSoon?"#fde68a":selected?"#a5b4fc":"#f1f5f9";
  return(
    <div style={{background:bg,border:`1px solid ${border}`,borderRadius:12,padding:"10px 12px",marginBottom:6,cursor:"pointer"}}
      onClick={()=>onView(task)}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input type="checkbox" checked={selected} onChange={e=>{e.stopPropagation();onSelect(task.id,e.target.checked)}} style={{accentColor:"#4f46e5",flexShrink:0}} onClick={e=>e.stopPropagation()}/>
        <select value={task.status} onChange={e=>{e.stopPropagation();onStatusChange(task.id,e.target.value)}} onClick={e=>e.stopPropagation()}
          style={{...Object.fromEntries(STATUS_COLOR[task.status].split(";").map(s=>s.split(":").map(x=>x.trim()))),border:"none",borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:600,cursor:"pointer",outline:"none",flexShrink:0}}>
          {STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {task.issueNo&&<span style={{fontSize:10,background:"#f1f5f9",color:"#64748b",padding:"1px 6px",borderRadius:20,flexShrink:0}}>#{task.issueNo}</span>}
            <span style={{fontWeight:600,fontSize:13,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</span>
            {task.category&&<span style={{fontSize:10,background:"#f8fafc",color:"#64748b",padding:"1px 6px",borderRadius:20,flexShrink:0}}>{task.category}</span>}
            <span style={{width:7,height:7,borderRadius:"50%",background:PRIORITY_DOT[task.priority],display:"inline-block",flexShrink:0}}/>
          </div>
          <div style={{display:"flex",gap:10,marginTop:3,fontSize:11,color:"#94a3b8",flexWrap:"wrap"}}>
            {sup&&<span style={{color:"#818cf8"}}>🏢 {sup.name}</span>}
            {task.manufactory&&<span>🏭 {task.manufactory}</span>}
            {task.owner&&<span>👤 {task.owner}</span>}
            {task.dueDate&&<span style={{color:isOverdue?"#ef4444":isDueSoon?"#f59e0b":"#94a3b8",fontWeight:isOverdue||isDueSoon?600:400}}>
              📅 {formatDate(task.dueDate)}{dl!==null&&` · ${isOverdue?Math.abs(dl)+"d overdue":dl===0?"today":dl+"d left"}`}
            </span>}
            {task.comments.length>0&&<span>💬 {task.comments.length}</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5}}>
            <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:3}}>
              <div style={{background:"#818cf8",height:3,borderRadius:4,width:`${task.progress}%`}}/>
            </div>
            <span style={{fontSize:10,color:"#94a3b8",width:26,textAlign:"right"}}>{task.progress}%</span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end",flexShrink:0}} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>onQuickUpdate(task)}
            style={{background:"#4f46e5",color:"white",border:"none",borderRadius:8,width:26,height:26,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:300}}>+</button>
          <div style={{display:"flex",gap:3}}>
            <button onClick={()=>onEdit(task)} style={{fontSize:10,color:"#94a3b8",background:"white",border:"1px solid #e2e8f0",borderRadius:6,padding:"2px 7px",cursor:"pointer"}}>Edit</button>
            <button onClick={()=>onDelete(task.id)} style={{fontSize:10,color:"#ef4444",background:"white",border:"1px solid #fecaca",borderRadius:6,padding:"2px 7px",cursor:"pointer"}}>Del</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function BulkBar({count,onStatusChange,onClear}){
  const[status,setStatus]=useState("In Progress");
  if(count===0)return null;
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,background:"#4f46e5",color:"white",borderRadius:12,padding:"10px 14px",marginBottom:10}}>
      <span style={{fontSize:13,fontWeight:600}}>{count} selected</span>
      <div style={{flex:1}}/>
      <select value={status} onChange={e=>setStatus(e.target.value)}
        style={{background:"#4338ca",border:"none",borderRadius:8,padding:"4px 8px",color:"white",fontSize:12,outline:"none"}}>
        {STATUSES.map(s=><option key={s}>{s}</option>)}

      <button onClick={onClear} style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",cursor:"pointer",fontSize:14}}>✕</button>

function StepRow({step,onUpdate,onDelete}){
  const[expanded,setExpanded]=useState(false);
  const dl=daysLeft(step.dueDate);
  const isOverdue=step.status!=="Done"&&!step.skipped&&dl!==null&&dl<0;
  const STEP_STATUS_COLOR={"New":"#f1f5f9;color:#475569","In Progress":"#dbeafe;color:#1d4ed8","Pending":"#fef3c7;color:#b45309","Done":"#dcfce7;color:#15803d"};
  return(
    <div style={{border:`1px solid ${isOverdue?"#fecaca":"#f1f5f9"}`,borderRadius:8,marginBottom:6,opacity:step.skipped?0.5:1}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",cursor:"pointer"}} onClick={()=>setExpanded(!expanded)}>
        <span style={{fontSize:11,color:"#94a3b8",width:32,flexShrink:0}}>{step.no}</span>
        <select value={step.status} onClick={e=>e.stopPropagation()} onChange={e=>onUpdate({...step,status:e.target.value,updatedAt:new Date().toISOString()})}
          style={{...Object.fromEntries(STEP_STATUS_COLOR[step.status].split(";").map(s=>s.split(":").map(x=>x.trim()))),border:"none",borderRadius:8,padding:"2px 6px",fontSize:10,fontWeight:600,cursor:"pointer",outline:"none",flexShrink:0}}>
          {STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <span style={{flex:1,fontSize:12,color:step.skipped?"#94a3b8":"#1e293b",textDecoration:step.skipped?"line-through":"none"}}>{step.title}</span>
        {step.dueDate&&<span style={{fontSize:10,color:isOverdue?"#ef4444":"#94a3b8",flexShrink:0}}>{formatDate(step.dueDate)}</span>}
        {step.evidenceUrl&&<span style={{fontSize:10,flexShrink:0}}>📎</span>}
        <span style={{fontSize:10,color:"#cbd5e1",flexShrink:0}}>{expanded?"▲":"▼"}</span>
      </div>
      {expanded&&(
        <div style={{padding:"10px",borderTop:"1px solid #f1f5f9",background:"#f8fafc"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div>
              <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3}}>Due date</label>
              <input type="date" value={step.dueDate} onChange={e=>onUpdate({...step,dueDate:e.target.value})}
                style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6}}>
              <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#64748b",cursor:"pointer"}}>
                <input type="checkbox" checked={step.skipped} onChange={e=>onUpdate({...step,skipped:e.target.checked})} style={{accentColor:"#94a3b8"}}/>
                Skip / Not applicable
              </label>
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3}}>Update note</label>
            <textarea rows={2} value={step.note} onChange={e=>onUpdate({...step,note:e.target.value,updatedAt:new Date().toISOString()})}
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",boxSizing:"border-box",resize:"vertical"}}/>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3}}>Remark</label>
            <input value={step.remark} onChange={e=>onUpdate({...step,remark:e.target.value})}
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3}}>Evidence (link/ảnh)</label>
            <input value={step.evidenceUrl} onChange={e=>onUpdate({...step,evidenceUrl:e.target.value})} placeholder="https://drive.google.com/..."
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
            {step.evidenceUrl&&(
              <div style={{marginTop:6}}>
                {/\.(jpg|jpeg|png|gif|webp)/i.test(step.evidenceUrl)
                  ?<img src={step.evidenceUrl} className="img-preview" alt="evidence" style={{maxHeight:100}} onError={e=>{e.target.style.display="none"}}/>
                  :<a href={step.evidenceUrl} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#4f46e5"}}>🔗 View evidence</a>
                }
              </div>
            )}
          </div>
          {step.updatedAt&&<div style={{fontSize:10,color:"#cbd5e1"}}>Last updated: {new Date(step.updatedAt).toLocaleString("vi-VN")}</div>}
        </div>
      )}
    </div>
  );
}

function DevProjectModal({project,suppliers,defaultSupplierId,onSave,onClose}){
  const[title,setTitle]=useState(project?.title||"");
  const[factoryType,setFactoryType]=useState(project?.factoryType||"New");
  const[supplierId,setSupplierId]=useState(project?.supplierId||defaultSupplierId||suppliers[0]?.id||"");
  const[saving,setSaving]=useState(false);
  async function save(){
    setSaving(true);
    const steps=project?project.steps:makeSteps(factoryType);
    await onSave({id:project?.id||uid(),supplierId,title:title.trim(),factoryType,status:project?.status||"In Progress",steps});
    setSaving(false);
  }
  return(
    <Modal title={project?"Edit project":"New development project"} onClose={onClose}
      footer={<><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={save} disabled={!title.trim()||!supplierId||saving}>{saving?"Saving...":"Save"}</Btn></>}>
      <Sel label="Supplier *" value={supplierId} onChange={setSupplierId}
        options={[{value:"",label:"— chọn supplier —"},...suppliers.map(s=>({value:s.id,label:s.name}))]} required/>
      <Inp label="Project title (SKU/product name) *" value={title} onChange={setTitle} placeholder="VD: KusaQuick 500mL new bottle" required/>
      {!project&&<Sel label="Factory type" value={factoryType} onChange={setFactoryType}
        options={[{value:"New",label:"New factory (full process, step 1-9)"},{value:"Existing",label:"Existing factory (step 4-9 only)"}]}/>}
      {project&&<div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",padding:"8px 10px",borderRadius:8}}>Factory type: <b>{factoryType}</b> (không thể đổi sau khi tạo, vì checklist đã sinh ra)</div>}
    </Modal>
  );
}

function DevProjectDetail({project,suppliers,onUpdateStep,onAddStep,onDeleteStep,onClose,onEdit,onDelete}){
  const sup=suppliers.find(s=>s.id===project.supplierId);
  const[newStepTitle,setNewStepTitle]=useState("");
  const groups=[...new Set(project.steps.map(s=>s.group))];
  const activeSteps=project.steps.filter(s=>!s.skipped);
  const doneSteps=activeSteps.filter(s=>s.status==="Done");
  const rate=activeSteps.length?Math.round((doneSteps.length/activeSteps.length)*100):0;
  function addCustomStep(){
    if(!newStepTitle.trim())return;
    onAddStep({id:uid(),group:"custom",no:"+",title:newStepTitle.trim(),status:"New",dueDate:"",note:"",remark:"",evidenceUrl:"",updatedAt:"",skipped:false});
    setNewStepTitle("");
  }
  return(
    <Modal title={project.title} onClose={onClose} wide
      footer={
        <div style={{display:"flex",gap:8,width:"100%"}}>
          <Btn variant="secondary" onClick={onClose}>Close</Btn>
          <div style={{flex:1}}/>
          <Btn variant="secondary" onClick={()=>onEdit(project)}>Edit</Btn>
          <Btn variant="danger" onClick={()=>onDelete(project.id)}>Delete</Btn>
        </div>
      }>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:11,background:"#eef2ff",color:"#4f46e5",padding:"3px 10px",borderRadius:20}}>{sup?.name}</span>
        <span style={{fontSize:11,background:"#f8fafc",color:"#64748b",padding:"3px 10px",borderRadius:20}}>{project.factoryType} factory</span>
        <span style={{fontSize:11,background:"#f0fdf4",color:"#15803d",padding:"3px 10px",borderRadius:20}}>{doneSteps.length}/{activeSteps.length} done · {rate}%</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:6}}><div style={{background:"#818cf8",height:6,borderRadius:4,width:`${rate}%`}}/></div>
        <span style={{fontSize:11,color:"#94a3b8"}}>{rate}%</span>
      </div>
      {groups.map(g=>(
        <div key={g} style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>
            {g==="custom"?"Custom steps":`Group ${g}`}
          </div>
          {project.steps.filter(s=>s.group===g).map(step=>(
            <StepRow key={step.id} step={step} onUpdate={onUpdateStep} onDelete={onDeleteStep}/>
          ))}
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginTop:12,paddingTop:12,borderTop:"1px solid #f1f5f9"}}>
        <input value={newStepTitle} onChange={e=>setNewStepTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomStep()}
          placeholder="Thêm step tùy chỉnh cho case đặc biệt..."
          style={{flex:1,border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"}}/>
        <Btn small onClick={addCustomStep}>+ Add step</Btn>
      </div>
    </Modal>
  );
}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:"#1e293b"}}>{project.title}</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{sup?.name} · {project.factoryType} factory</div>
        </div>
        <span style={{fontSize:10,background:project.status==="Done"?"#dcfce7":"#dbeafe",color:project.status==="Done"?"#15803d":"#1d4ed8",padding:"2px 8px",borderRadius:20,flexShrink:0}}>{project.status}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:5}}><div style={{background:"#818cf8",height:5,borderRadius:4,width:`${rate}%`}}/></div>

function SupplierCard({supplier,tasks,onOpen,onEdit,onDelete}){
  const active=tasks.filter(t=>t.status!=="Done");
  const done=tasks.filter(t=>t.status==="Done").length;
  const overdue=active.filter(t=>t.dueDate&&daysLeft(t.dueDate)<0).length;
  const dueSoon=active.filter(t=>t.dueDate&&daysLeft(t.dueDate)>=0&&daysLeft(t.dueDate)<=7).length;
  const rate=tasks.length?Math.round((done/tasks.length)*100):0;
  return(
    <div onClick={()=>onOpen(supplier.id)}
      style={{background:"white",border:`1px solid ${overdue>0?"#fecaca":dueSoon>0?"#fde68a":"#f1f5f9"}`,borderRadius:16,padding:18,cursor:"pointer"}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 20px rgba(0,0,0,0.08)"}
      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{supplier.name}</div>
          {supplier.location&&<div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>📍 {supplier.location}</div>}
        </div>
        <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>onEdit(supplier)} style={{fontSize:11,color:"#94a3b8",background:"white",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>Edit</button>
          <button onClick={()=>onDelete(supplier.id)} style={{fontSize:11,color:"#ef4444",background:"white",border:"1px solid #fecaca",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>Del</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
        {[["Total",tasks.length,"#475569"],["Active",active.length,"#2563eb"],["Done",done,"#16a34a"],["Overdue",overdue,overdue>0?"#dc2626":"#cbd5e1"]].map(([l,v,c])=>(
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{l}</div>
          </div>
        ))}
      </div>
      {dueSoon>0&&<div style={{fontSize:11,color:"#d97706",marginBottom:8}}>⚠ {dueSoon} due within 7 days</div>}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:6}}>
          <div style={{background:"#818cf8",height:6,borderRadius:4,width:`${rate}%`}}/>
        </div>
        <span style={{fontSize:11,color:"#94a3b8"}}>{rate}%</span>
      </div>
    </div>
  );
}

function KPIBar({tasks}){
  const active=tasks.filter(t=>t.status!=="Done");
  const done=tasks.filter(t=>t.status==="Done").length;
  const inProg=tasks.filter(t=>t.status==="In Progress").length;
  const overdue=active.filter(t=>t.dueDate&&daysLeft(t.dueDate)<0).length;
  const dueSoon=active.filter(t=>t.dueDate&&daysLeft(t.dueDate)>=0&&daysLeft(t.dueDate)<=7).length;
  const rate=tasks.length?Math.round((done/tasks.length)*100):0;
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20}}>
      {[["Total",tasks.length,"#475569","#f8fafc","#e2e8f0"],
        ["Active",active.length,"#1d4ed8","#eff6ff","#bfdbfe"],
        ["Done",done,"#15803d","#f0fdf4","#bbf7d0"],
        ["Overdue",overdue,overdue>0?"#dc2626":"#cbd5e1",overdue>0?"#fff5f5":"#f8fafc",overdue>0?"#fecaca":"#f1f5f9"],
        ["Due ≤7d",dueSoon,dueSoon>0?"#d97706":"#cbd5e1",dueSoon>0?"#fffbeb":"#f8fafc",dueSoon>0?"#fde68a":"#f1f5f9"],
        ["Done %",rate+"%","#4338ca","#eef2ff","#c7d2fe"],
      ].map(([l,v,tc,bg,border])=>(
        <div key={l} style={{background:bg,border:`1px solid ${border}`,borderRadius:12,padding:"10px 12px"}}>
          <div style={{fontSize:20,fontWeight:700,color:tc}}>{v}</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const[suppliers,setSuppliers]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[devProjects,setDevProjects]=useState([]);
  const[supplierTab,setSupplierTab]=useState("dev");
  const[devProjectModal,setDevProjectModal]=useState(null);
  const[viewDevProject,setViewDevProject]=useState(null);
  const[view,setView]=useState("dashboard");
  const[selectedSupplier,setSelectedSupplier]=useState(null);
  const[taskModal,setTaskModal]=useState(null);
  const[supplierModal,setSupplierModal]=useState(null);
  const[quickUpdateTask,setQuickUpdateTask]=useState(null);
  const[viewTask,setViewTask]=useState(null);
  const[filterStatus,setFilterStatus]=useState("All");
  const[filterType,setFilterType]=useState("All");
  const[search,setSearch]=useState("");
  const[selectedIds,setSelectedIds]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");

  async function reload(){
    try{
      const[f,t,d]=await Promise.all([dbGet("factories"),dbGet("tasks"),dbGet("dev_projects")]);
      setSuppliers(f.map(mapSupplier));setTasks(t.map(mapTask));setDevProjects(d.map(mapDevProject));setError("");
    }catch(e){setError("DB error: "+e.message);}
    setLoading(false);
  }
  useEffect(()=>{reload();},[]);

  async function handleSaveDevProject(p){
    const exists=devProjects.find(x=>x.id===p.id);
    const row={id:p.id,supplier_id:p.supplierId,title:p.title,factory_type:p.factoryType,status:p.status,steps:p.steps};
    if(exists)await dbUpdate("dev_projects",p.id,row);else await dbInsert("dev_projects",row);
    await reload();setDevProjectModal(null);
    setViewDevProject(v=>v&&v.id===p.id?{...v,...p}:v);
  }
  async function handleDeleteDevProject(id){
    if(!confirm("Delete this development project?"))return;
    await dbDelete("dev_projects",id);await reload();setViewDevProject(null);
  }
  async function handleUpdateStep(project,updatedStep){
    const newSteps=project.steps.map(s=>s.id===updatedStep.id?updatedStep:s);
    await dbUpdate("dev_projects",project.id,{steps:newSteps});
    setDevProjects(ps=>ps.map(p=>p.id===project.id?{...p,steps:newSteps}:p));
    setViewDevProject(v=>v&&v.id===project.id?{...v,steps:newSteps}:v);
  }
  async function handleAddStep(project,newStep){
    const newSteps=[...project.steps,newStep];
    await dbUpdate("dev_projects",project.id,{steps:newSteps});
    setDevProjects(ps=>ps.map(p=>p.id===project.id?{...p,steps:newSteps}:p));
    setViewDevProject(v=>v&&v.id===project.id?{...v,steps:newSteps}:v);
  }
  async function handleDeleteStep(project,stepId){
    const newSteps=project.steps.filter(s=>s.id!==stepId);
    await dbUpdate("dev_projects",project.id,{steps:newSteps});
    setDevProjects(ps=>ps.map(p=>p.id===project.id?{...p,steps:newSteps}:p));
    setViewDevProject(v=>v&&v.id===project.id?{...v,steps:newSteps}:v);
  }

  async function handleSaveSupplier(s){
    const exists=suppliers.find(x=>x.id===s.id);
    if(exists)await dbUpdate("factories",s.id,{name:s.name,location:s.location,note:s.note});
    else await dbInsert("factories",{id:s.id,name:s.name,location:s.location,note:s.note});
    await reload();setSupplierModal(null);
  }
  async function handleDeleteSupplier(id){
    if(!confirm("Delete supplier and all issues?"))return;
    await dbDelete("factories",id);await reload();
    if(selectedSupplier===id)setSelectedSupplier(null);
  }
  async function handleSaveTask(t){
    const exists=tasks.find(x=>x.id===t.id);
    const row={id:t.id,factory_id:t.supplierId,partner:t.partner,title:t.title,type:t.type,status:t.status,priority:t.priority,
      owner:t.owner,factory_owner:t.factoryOwner||"",manufactory:t.manufactory||"",category:t.category||"",
      issue_no:t.issueNo||"",item_jp:t.itemJp||"",item_en:t.itemEn||"",occur_process:t.occurProcess||"",
      product_name:t.productName||"",cause:t.cause||"",request_from_cainz:t.requestFromCainz||"",
      start_date:t.startDate||null,due_date:t.dueDate||null,progress:t.progress,subtasks:t.subtasks,comments:t.comments};
    if(exists)await dbUpdate("tasks",t.id,row);else await dbInsert("tasks",row);
    await reload();setTaskModal(null);
  }
  async function handleDeleteTask(id){
    if(!confirm("Delete this issue?"))return;
    await dbDelete("tasks",id);await reload();
    setSelectedIds(ids=>ids.filter(i=>i!==id));
  }
  async function handleEditComment(task,commentId,updatedComment){
    const newComments=task.comments.map(c=>c.id===commentId?updatedComment:c);
    await dbUpdate("tasks",task.id,{comments:newComments});
    await reload();
    setViewTask(v=>v&&v.id===task.id?{...v,comments:newComments}:v);
  }
  async function handleDeleteComment(task,commentId){
    const newComments=task.comments.filter(c=>c.id!==commentId);
    await dbUpdate("tasks",task.id,{comments:newComments});
    await reload();
    setViewTask(v=>v&&v.id===task.id?{...v,comments:newComments}:v);
  }
  async function handleStatusChange(id,status){
    const progress=status==="Done"?100:tasks.find(t=>t.id===id)?.progress||0;
    await dbUpdate("tasks",id,{status,progress});
    setTasks(ts=>ts.map(t=>t.id===id?{...t,status,progress}:t));
  }
  async function handleBulkStatus(status){
    await Promise.all(selectedIds.map(id=>{
      const progress=status==="Done"?100:tasks.find(t=>t.id===id)?.progress||0;
      return dbUpdate("tasks",id,{status,progress});
    }));
    await reload();setSelectedIds([]);
  }

  const activeSupplier=suppliers.find(s=>s.id===selectedSupplier);
  const filterFn=t=>{
    if(filterStatus!=="All"&&t.status!==filterStatus)return false;
    if(filterType!=="All"&&t.type!==filterType)return false;
    if(search&&!t.title.toLowerCase().includes(search.toLowerCase())&&
       !t.issueNo.toLowerCase().includes(search.toLowerCase())&&
       !t.itemEn.toLowerCase().includes(search.toLowerCase())&&
       !t.partner.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  };

  // Dashboard: only non-Done tasks
  const activeTasks=tasks.filter(t=>t.status!=="Done");
  const supplierTasks=selectedSupplier?tasks.filter(t=>t.supplierId===selectedSupplier).filter(filterFn):[];
  const allFiltered=tasks.filter(filterFn);
  const overdueAll=activeTasks.filter(t=>t.dueDate&&daysLeft(t.dueDate)<0);
  const dueSoonAll=activeTasks.filter(t=>t.dueDate&&daysLeft(t.dueDate)>=0&&daysLeft(t.dueDate)<=7);

  function FilterBar(){
    return(
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
          style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 12px",fontSize:13,outline:"none",width:160}}/>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
          style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 12px",fontSize:13,background:"white",outline:"none"}}>
          {["All",...STATUSES].map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)}
          style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 12px",fontSize:13,background:"white",outline:"none"}}>
          {["All",...TYPES].map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
    );
  }

  function IssueList({list}){
    return list.length===0
      ?<div style={{textAlign:"center",color:"#94a3b8",fontSize:13,padding:"40px 0"}}>No issues found.</div>
      :<div>{list.map(t=><IssueRow key={t.id} task={t} suppliers={suppliers}
          selected={selectedIds.includes(t.id)}
          onSelect={(id,checked)=>setSelectedIds(ids=>checked?[...ids,id]:ids.filter(i=>i!==id))}
          onView={setViewTask} onEdit={setTaskModal} onDelete={handleDeleteTask}
          onStatusChange={handleStatusChange} onQuickUpdate={setQuickUpdateTask}/>)}</div>;
  }

  function resetNav(v){setView(v);setSelectedSupplier(null);setSelectedIds([]);setSearch("");setFilterStatus("All");setFilterType("All");}

  return(
    <div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      {/* Header */}
      <div style={{background:"white",borderBottom:"1px solid #f1f5f9",position:"sticky",top:0,zIndex:40}}>
        <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",gap:6,height:50}}>
          <span style={{fontWeight:800,color:"#4f46e5",fontSize:15,marginRight:6}}>ProjectTrack</span>
          <div style={{display:"flex",gap:2,flex:1}}>
            {[["dashboard","Dashboard"],["suppliers","Suppliers"],["issues","All Issues"],["stats","Stats"]].map(([v,l])=>(
              <button key={v} onClick={()=>resetNav(v)}
                style={{padding:"5px 12px",borderRadius:8,border:"none",fontSize:13,cursor:"pointer",fontWeight:view===v&&!selectedSupplier?600:400,
                  background:view===v&&!selectedSupplier?"#4f46e5":"transparent",
                  color:view===v&&!selectedSupplier?"white":"#64748b"}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>exportCSV(tasks,suppliers)} style={{fontSize:12,border:"1px solid #e2e8f0",color:"#64748b",background:"white",padding:"5px 12px",borderRadius:8,cursor:"pointer"}}>↓ CSV</button>
            {view==="suppliers"&&!selectedSupplier&&<button onClick={()=>setSupplierModal("new")} style={{fontSize:12,border:"1px solid #c7d2fe",color:"#4f46e5",background:"#eef2ff",padding:"5px 12px",borderRadius:8,cursor:"pointer"}}>+ Supplier</button>}
            <button onClick={()=>setTaskModal("new")} style={{fontSize:12,background:"#4f46e5",color:"white",border:"none",padding:"5px 14px",borderRadius:8,cursor:"pointer",fontWeight:600}}>+ New Issue</button>
          </div>
        </div>
        {selectedSupplier&&activeSupplier&&(
          <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px 8px",display:"flex",alignItems:"center",gap:6,fontSize:13}}>
            <button onClick={()=>{setSelectedSupplier(null);setSelectedIds([]);}} style={{color:"#4f46e5",background:"none",border:"none",cursor:"pointer",padding:0}}>Suppliers</button>
            <span style={{color:"#cbd5e1"}}>›</span>
            <span style={{color:"#334155",fontWeight:600}}>{activeSupplier.name}</span>
            {activeSupplier.location&&<span style={{color:"#94a3b8"}}>· {activeSupplier.location}</span>}
          </div>
        )}
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px"}}>
        {error&&<div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#dc2626"}}>{error}</div>}
        {loading?(
          <div style={{textAlign:"center",padding:"80px 0",color:"#94a3b8",fontSize:14}}>⏳ Connecting to database...</div>
        ):(
          <>
            {/* Supplier detail — tabs Development | QC */}
            {selectedSupplier&&<>
              <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:"1px solid #f1f5f9"}}>
                {[["dev","Development"],["qc","QC"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setSupplierTab(v)}
                    style={{padding:"7px 16px",fontSize:13,border:"none",borderBottom:supplierTab===v?"2px solid #4f46e5":"2px solid transparent",color:supplierTab===v?"#4f46e5":"#94a3b8",background:"none",cursor:"pointer",fontWeight:supplierTab===v?600:400}}>
                    {l}
                  </button>
                ))}
              </div>

              {supplierTab==="dev"&&<>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontSize:13,color:"#94a3b8"}}>{devProjects.filter(p=>p.supplierId===selectedSupplier).length} projects</span>
                  <button onClick={()=>setDevProjectModal("new")} style={{fontSize:12,background:"#4f46e5",color:"white",border:"none",padding:"5px 14px",borderRadius:8,cursor:"pointer"}}>+ New project</button>
                </div>
                {devProjects.filter(p=>p.supplierId===selectedSupplier).length===0
                  ?<div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",fontSize:13}}>No development projects yet.</div>
                  :devProjects.filter(p=>p.supplierId===selectedSupplier).map(p=>(
                    <DevProjectCard key={p.id} project={p} suppliers={suppliers} onOpen={setViewDevProject}/>
                  ))
                }
              </>}

              {supplierTab==="qc"&&<>
                <FilterBar/>
                <BulkBar count={selectedIds.length} onStatusChange={handleBulkStatus} onClear={()=>setSelectedIds([])}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontSize:13,color:"#94a3b8"}}>{supplierTasks.length} issues</span>
                  <button onClick={()=>setTaskModal("new")} style={{fontSize:12,background:"#4f46e5",color:"white",border:"none",padding:"5px 14px",borderRadius:8,cursor:"pointer"}}>+ Add issue</button>
                </div>
                <IssueList list={supplierTasks}/>
              </>}
            </>}

            {/* Dashboard — only active (non-Done) tasks */}
            {view==="dashboard"&&!selectedSupplier&&<>
              <KPIBar tasks={tasks}/>
              {overdueAll.length>0&&(
                <div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:12,padding:"12px 16px",marginBottom:12}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#dc2626",marginBottom:8}}>🔴 Overdue ({overdueAll.length})</div>
                  {overdueAll.map(t=>{const sup=suppliers.find(s=>s.id===t.supplierId);return(
                    <div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}>
                      <span style={{color:"#dc2626"}}>{t.title}<span style={{color:"#f87171",fontWeight:400}}> · {sup?.name}</span></span>
                      <span style={{color:"#f87171",fontSize:11}}>{Math.abs(daysLeft(t.dueDate))}d overdue · {t.owner||"—"}</span>
                    </div>
                  );})}
                </div>
              )}
              {dueSoonAll.length>0&&(
                <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"12px 16px",marginBottom:12}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#d97706",marginBottom:8}}>🟡 Due within 7 days ({dueSoonAll.length})</div>
                  {dueSoonAll.map(t=>{const sup=suppliers.find(s=>s.id===t.supplierId);return(
                    <div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}>
                      <span style={{color:"#d97706"}}>{t.title}<span style={{color:"#fbbf24",fontWeight:400}}> · {sup?.name}</span></span>
                      <span style={{color:"#fbbf24",fontSize:11}}>{daysLeft(t.dueDate)===0?"today":daysLeft(t.dueDate)+"d left"} · {t.owner||"—"}</span>
                    </div>
                  );})}
                </div>
              )}
              <div style={{fontWeight:600,fontSize:14,color:"#334155",marginBottom:10}}>Active issues</div>
              {activeTasks.length===0
                ?<div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}>
                  <div style={{fontSize:40,marginBottom:8}}>✅</div>
                  <div style={{fontSize:14}}>All clear! No active issues.</div>
                </div>
                :<><IssueList list={activeTasks.slice(0,10)}/>
                  {activeTasks.length>10&&<button onClick={()=>setView("issues")} style={{width:"100%",textAlign:"center",color:"#4f46e5",fontSize:13,background:"none",border:"none",cursor:"pointer",padding:"12px 0"}}>View all {activeTasks.length} active issues →</button>}
                </>
              }
            </>}

            {/* Suppliers */}
            {view==="suppliers"&&!selectedSupplier&&(
              suppliers.length===0
                ?<div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}><div style={{fontSize:40,marginBottom:8}}>🏢</div><div style={{fontSize:14}}>No suppliers yet. Click <b>+ Supplier</b>.</div></div>
                :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
                  {suppliers.map(s=><SupplierCard key={s.id} supplier={s} tasks={tasks.filter(t=>t.supplierId===s.id)}
                    onOpen={id=>{setSelectedSupplier(id);setSearch("");setFilterStatus("All");setFilterType("All");}}
                    onEdit={setSupplierModal} onDelete={handleDeleteSupplier}/>)}
                </div>
            )}

            {/* All Issues */}
            {view==="issues"&&!selectedSupplier&&<>
              <FilterBar/>
              <BulkBar count={selectedIds.length} onStatusChange={handleBulkStatus} onClear={()=>setSelectedIds([])}/>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>{allFiltered.length} issues</div>
              <IssueList list={allFiltered}/>
            </>}

            {/* Stats */}
            {view==="stats"&&!selectedSupplier&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                <div style={{background:"white",border:"1px solid #f1f5f9",borderRadius:12,padding:16}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#334155",marginBottom:12}}>By status</div>
                  {STATUSES.map(s=>{const c=tasks.filter(t=>t.status===s).length;const pct=tasks.length?(c/tasks.length)*100:0;return(
                    <div key={s} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{...Object.fromEntries(STATUS_COLOR[s].split(";").map(x=>x.split(":").map(y=>y.trim()))),fontSize:11,borderRadius:20,padding:"2px 8px",width:72,textAlign:"center",display:"inline-block"}}>{s}</span>
                      <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:8}}><div style={{background:"#818cf8",height:8,borderRadius:4,width:`${pct}%`}}/></div>
                      <span style={{fontSize:12,color:"#94a3b8",width:20,textAlign:"right"}}>{c}</span>
                    </div>
                  );})}
                </div>
                <div style={{background:"white",border:"1px solid #f1f5f9",borderRadius:12,padding:16}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#334155",marginBottom:12}}>Completion by supplier</div>
                  {suppliers.length===0?<div style={{fontSize:13,color:"#94a3b8"}}>No data.</div>:suppliers.map(s=>{
                    const st=tasks.filter(t=>t.supplierId===s.id);const done=st.filter(t=>t.status==="Done").length;const rate=st.length?Math.round((done/st.length)*100):0;return(
                      <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <span style={{fontSize:12,color:"#334155",width:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                        <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:8}}><div style={{background:"#4ade80",height:8,borderRadius:4,width:`${rate}%`}}/></div>
                        <span style={{fontSize:11,color:"#94a3b8",width:60,textAlign:"right"}}>{done}/{st.length} · {rate}%</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{background:"white",border:"1px solid #f1f5f9",borderRadius:12,padding:16}}>
                <div style={{fontWeight:600,fontSize:14,color:"#334155",marginBottom:16}}>Long-term vs Short-term</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
                  {TYPES.map(type=>{const items=tasks.filter(t=>t.type===type);const done=items.filter(t=>t.status==="Done").length;const rate=items.length?Math.round((done/items.length)*100):0;return(
                    <div key={type} style={{textAlign:"center"}}>
                      <div style={{fontSize:36,fontWeight:800,color:"#4f46e5"}}>{rate}%</div>
                      <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{type}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{done}/{items.length} done</div>
                      <div style={{marginTop:8,background:"#f1f5f9",borderRadius:4,height:8}}><div style={{background:"#818cf8",height:8,borderRadius:4,width:`${rate}%`}}/></div>
                    </div>
                  );})}
                </div>
              </div>
            </>}
          </>
        )}
      </div>

      {taskModal&&<TaskModal task={taskModal==="new"?null:taskModal} suppliers={suppliers} defaultSupplierId={selectedSupplier} onSave={handleSaveTask} onClose={()=>setTaskModal(null)}/>}
      {supplierModal&&<SupplierModal supplier={supplierModal==="new"?null:supplierModal} onSave={handleSaveSupplier} onClose={()=>setSupplierModal(null)}/>}
      {quickUpdateTask&&<QuickUpdateModal task={quickUpdateTask} onSave={async(updated)=>{await handleSaveTask(updated);setQuickUpdateTask(null);}} onClose={()=>setQuickUpdateTask(null)}/>}
      {viewTask&&<TaskDetailModal task={viewTask} suppliers={suppliers} onClose={()=>setViewTask(null)} onEdit={t=>{setViewTask(null);setTaskModal(t);}} onQuickUpdate={t=>{setViewTask(null);setQuickUpdateTask(t);}} onEditComment={handleEditComment} onDeleteComment={handleDeleteComment}/>}
      {devProjectModal&&<DevProjectModal project={devProjectModal==="new"?null:devProjectModal} suppliers={suppliers} defaultSupplierId={selectedSupplier} onSave={handleSaveDevProject} onClose={()=>setDevProjectModal(null)}/>}
      {viewDevProject&&<DevProjectDetail project={viewDevProject} suppliers={suppliers}
        onUpdateStep={(step)=>handleUpdateStep(viewDevProject,step)}
        onAddStep={(step)=>handleAddStep(viewDevProject,step)}
        onDeleteStep={(stepId)=>handleDeleteStep(viewDevProject,stepId)}
        onClose={()=>setViewDevProject(null)}
        onEdit={p=>{setViewDevProject(null);setDevProjectModal(p);}}
        onDelete={handleDeleteDevProject}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
